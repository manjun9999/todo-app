<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo App</title>
  <style>
    :root {
      --bg: #f4f5f7;
      --card: #ffffff;
      --text: #1f2933;
      --muted: #7b8794;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --danger: #ef4444;
      --border: #e4e7eb;
      --shadow: rgba(0, 0, 0, 0.06);
    }
    /* Dark palette — applied when the user picks it explicitly... */
    :root[data-theme="dark"] {
      --bg: #12151c;
      --card: #1c212b;
      --text: #e4e7eb;
      --muted: #9aa5b1;
      --accent: #60a5fa;
      --accent-hover: #3b82f6;
      --danger: #f87171;
      --border: #2b323d;
      --shadow: rgba(0, 0, 0, 0.4);
    }
    /* ...or when the OS prefers dark and the user hasn't chosen light. */
    @media (prefers-color-scheme: dark) {
      :root:not([data-theme="light"]) {
        --bg: #12151c;
        --card: #1c212b;
        --text: #e4e7eb;
        --muted: #9aa5b1;
        --accent: #60a5fa;
        --accent-hover: #3b82f6;
        --danger: #f87171;
        --border: #2b323d;
        --shadow: rgba(0, 0, 0, 0.4);
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      padding: 40px 16px;
      min-height: 100vh;
      transition: background 0.2s, color 0.2s;
    }
    .app {
      width: 100%;
      max-width: 480px;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin: 0 0 20px;
    }
    h1 {
      font-size: 1.6rem;
      margin: 0;
      text-align: center;
    }
    .theme-toggle {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 1.1rem;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .theme-toggle:hover { border-color: var(--accent); }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 1px 3px var(--shadow);
    }
    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    #new-task {
      flex: 1;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 1rem;
      outline: none;
    }
    #new-task:focus { border-color: var(--accent); }
    button {
      border: none;
      cursor: pointer;
      font-size: 1rem;
      border-radius: 8px;
    }
    .add-btn {
      background: var(--accent);
      color: #fff;
      padding: 10px 16px;
    }
    .add-btn:hover { background: var(--accent-hover); }
    .filters {
      display: flex;
      gap: 6px;
      margin-bottom: 12px;
    }
    .filter-btn {
      flex: 1;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 6px 0;
      font-size: 0.9rem;
    }
    .filter-btn:hover { border-color: var(--accent); }
    .filter-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .badge {
      display: inline-block;
      min-width: 18px;
      padding: 0 5px;
      margin-left: 4px;
      border-radius: 9px;
      background: var(--border);
      color: var(--text);
      font-size: 0.75rem;
      line-height: 1.4;
      vertical-align: middle;
    }
    .filter-btn.active .badge {
      background: rgba(255, 255, 255, 0.28);
      color: #fff;
    }
    ul {
      list-style: none;
      margin: 0;
      padding: 0;
    }
    li {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 4px;
      border-bottom: 1px solid var(--border);
    }
    li:last-child { border-bottom: none; }
    li.dragging { opacity: 0.4; }
    li.drag-over { box-shadow: inset 0 2px 0 var(--accent); }
    .grip {
      cursor: grab;
      color: var(--muted);
      font-size: 1rem;
      user-select: none;
      flex-shrink: 0;
    }
    .grip:active { cursor: grabbing; }
    li input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
      flex-shrink: 0;
    }
    .task-text {
      flex: 1;
      word-break: break-word;
    }
    li.done .task-text {
      text-decoration: line-through;
      color: var(--muted);
    }
    .edit-btn {
      background: transparent;
      color: var(--muted);
      font-size: 1rem;
      padding: 2px 6px;
      line-height: 1;
    }
    .edit-btn:hover { color: var(--accent); }
    .edit-input {
      flex: 1;
      padding: 6px 8px;
      border: 1px solid var(--accent);
      border-radius: 6px;
      font-size: 1rem;
      outline: none;
    }
    .delete-btn {
      background: transparent;
      color: var(--muted);
      font-size: 1.2rem;
      padding: 2px 8px;
      line-height: 1;
    }
    .delete-btn:hover { color: var(--danger); }
    .empty {
      text-align: center;
      color: var(--muted);
      padding: 20px 0;
    }
    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 14px;
      font-size: 0.85rem;
      color: var(--muted);
    }
    .clear-btn {
      background: transparent;
      color: var(--muted);
      padding: 4px 8px;
    }
    .clear-btn:hover { color: var(--danger); }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <h1>📝 My Todo List</h1>
      <button class="theme-toggle" id="theme-toggle" title="Toggle dark mode" aria-label="Toggle dark mode">🌙</button>
    </div>
    <div class="card">
      <div class="input-row">
        <input id="new-task" type="text" placeholder="What needs to be done?" autocomplete="off" />
        <button class="add-btn" id="add-btn">Add</button>
      </div>
      <div class="filters" id="filters">
        <button class="filter-btn active" data-filter="all">All <span class="badge" data-count="all">0</span></button>
        <button class="filter-btn" data-filter="active">Active <span class="badge" data-count="active">0</span></button>
        <button class="filter-btn" data-filter="done">Done <span class="badge" data-count="done">0</span></button>
      </div>
      <ul id="task-list"></ul>
      <div class="footer">
        <span id="count">0 items left</span>
        <button class="clear-btn" id="clear-done">Clear completed</button>
      </div>
    </div>
  </div>

  <script>
    // Prints a friendly greeting to the browser console.
    function helloWorld() {
      console.log("Hello, World!");
      return "Hello, World!";
    }
    helloWorld();

    const STORAGE_KEY = "todo.tasks";
    const input = document.getElementById("new-task");
    const addBtn = document.getElementById("add-btn");
    const list = document.getElementById("task-list");
    const count = document.getElementById("count");
    const clearDone = document.getElementById("clear-done");
    const themeToggle = document.getElementById("theme-toggle");
    const filters = document.getElementById("filters");

    const THEME_KEY = "todo.theme";
    let currentFilter = "all";
    let draggedId = null;

    // Moves the dragged task to the position of the task it was dropped on.
    function reorderTasks(fromId, toId) {
      if (fromId === toId) return;
      const from = tasks.findIndex((t) => t.id === fromId);
      if (from === -1) return;
      const [moved] = tasks.splice(from, 1);
      const to = tasks.findIndex((t) => t.id === toId);
      tasks.splice(to === -1 ? tasks.length : to, 0, moved);
      save();
      render();
    }

    // Applies a theme ("dark"/"light"), or falls back to the OS preference
    // when no explicit choice has been saved.
    function applyTheme(theme) {
      if (theme === "dark" || theme === "light") {
        document.documentElement.setAttribute("data-theme", theme);
      } else {
        document.documentElement.removeAttribute("data-theme");
      }
      const isDark =
        theme === "dark" ||
        (!theme && window.matchMedia("(prefers-color-scheme: dark)").matches);
      themeToggle.textContent = isDark ? "☀️" : "🌙";
    }

    function toggleTheme() {
      const isDark = document.documentElement.getAttribute("data-theme") === "dark" ||
        (!document.documentElement.getAttribute("data-theme") &&
          window.matchMedia("(prefers-color-scheme: dark)").matches);
      const next = isDark ? "light" : "dark";
      localStorage.setItem(THEME_KEY, next);
      applyTheme(next);
    }

    applyTheme(localStorage.getItem(THEME_KEY));
    themeToggle.addEventListener("click", toggleTheme);

    let tasks = load();

    function load() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
      } catch {
        return [];
      }
    }

    function save() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
    }

    function addTask(text) {
      const trimmed = text.trim();
      if (!trimmed) return;
      tasks.push({ id: Date.now(), text: trimmed, done: false });
      save();
      render();
    }

    function toggleTask(id) {
      const task = tasks.find((t) => t.id === id);
      if (task) task.done = !task.done;
      save();
      render();
    }

    function deleteTask(id) {
      tasks = tasks.filter((t) => t.id !== id);
      save();
      render();
    }

    function editTask(id, newText) {
      const trimmed = newText.trim();
      const task = tasks.find((t) => t.id === id);
      if (!task) return;
      if (trimmed) {
        task.text = trimmed;
        save();
      }
      render();
    }

    // Swaps a task's text span for an inline input so it can be edited.
    function startEdit(li, span, task) {
      li.draggable = false;
      const editInput = document.createElement("input");
      editInput.type = "text";
      editInput.className = "edit-input";
      editInput.value = task.text;

      let finished = false;
      const commit = () => {
        if (finished) return;
        finished = true;
        editTask(task.id, editInput.value);
      };
      const cancel = () => {
        if (finished) return;
        finished = true;
        render();
      };

      editInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") commit();
        else if (e.key === "Escape") cancel();
      });
      editInput.addEventListener("blur", commit);

      li.replaceChild(editInput, span);
      editInput.focus();
      editInput.select();
    }

    function render() {
      list.innerHTML = "";

      const visible = tasks.filter((task) => {
        if (currentFilter === "active") return !task.done;
        if (currentFilter === "done") return task.done;
        return true;
      });

      if (visible.length === 0) {
        const empty = document.createElement("li");
        empty.className = "empty";
        empty.textContent =
          tasks.length === 0
            ? "No tasks yet — add one above!"
            : currentFilter === "active"
            ? "No active tasks. 🎉"
            : currentFilter === "done"
            ? "No completed tasks yet."
            : "No tasks to show.";
        list.appendChild(empty);
      }

      visible.forEach((task) => {
        const li = document.createElement("li");
        if (task.done) li.classList.add("done");
        li.draggable = true;

        li.addEventListener("dragstart", (e) => {
          draggedId = task.id;
          li.classList.add("dragging");
          e.dataTransfer.effectAllowed = "move";
          e.dataTransfer.setData("text/plain", String(task.id));
        });
        li.addEventListener("dragend", () => {
          draggedId = null;
          li.classList.remove("dragging");
          list.querySelectorAll(".drag-over").forEach((el) =>
            el.classList.remove("drag-over")
          );
        });
        li.addEventListener("dragover", (e) => {
          e.preventDefault();
          e.dataTransfer.dropEffect = "move";
          if (draggedId !== null && draggedId !== task.id) {
            li.classList.add("drag-over");
          }
        });
        li.addEventListener("dragleave", () => li.classList.remove("drag-over"));
        li.addEventListener("drop", (e) => {
          e.preventDefault();
          li.classList.remove("drag-over");
          if (draggedId !== null) reorderTasks(draggedId, task.id);
        });

        const grip = document.createElement("span");
        grip.className = "grip";
        grip.textContent = "⠿";
        grip.title = "Drag to reorder";

        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.checked = task.done;
        checkbox.addEventListener("change", () => toggleTask(task.id));

        const span = document.createElement("span");
        span.className = "task-text";
        span.textContent = task.text;
        span.title = "Double-click to edit";
        span.addEventListener("dblclick", () => startEdit(li, span, task));

        const edit = document.createElement("button");
        edit.className = "edit-btn";
        edit.textContent = "✎";
        edit.title = "Edit";
        edit.addEventListener("click", () => startEdit(li, span, task));

        const del = document.createElement("button");
        del.className = "delete-btn";
        del.textContent = "×";
        del.title = "Delete";
        del.addEventListener("click", () => deleteTask(task.id));

        li.append(grip, checkbox, span, edit, del);
        list.appendChild(li);
      });

      const doneCount = tasks.filter((t) => t.done).length;
      const remaining = tasks.length - doneCount;
      count.textContent = `${remaining} item${remaining === 1 ? "" : "s"} left`;

      filters.querySelector('[data-count="all"]').textContent = tasks.length;
      filters.querySelector('[data-count="active"]').textContent = remaining;
      filters.querySelector('[data-count="done"]').textContent = doneCount;
    }

    filters.addEventListener("click", (e) => {
      const btn = e.target.closest(".filter-btn");
      if (!btn) return;
      currentFilter = btn.dataset.filter;
      filters.querySelectorAll(".filter-btn").forEach((b) =>
        b.classList.toggle("active", b === btn)
      );
      render();
    });

    addBtn.addEventListener("click", () => {
      addTask(input.value);
      input.value = "";
      input.focus();
    });

    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        addTask(input.value);
        input.value = "";
      }
    });

    clearDone.addEventListener("click", () => {
      tasks = tasks.filter((t) => !t.done);
      save();
      render();
    });

    render();
  </script>
</body>
</html>
