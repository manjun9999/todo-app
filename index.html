<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo App</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <div class="header">
      <h1>📝 My Todo List</h1>
      <button class="icon-btn" id="help-btn" title="Keyboard shortcuts (?)" aria-label="Keyboard shortcuts">⌨</button>
      <button class="icon-btn" id="theme-toggle" title="Toggle dark mode" aria-label="Toggle dark mode">🌙</button>
    </div>
    <div class="card">
      <div class="input-row">
        <input id="new-task" type="text" placeholder="What needs to be done? (add #tags)" autocomplete="off" />
        <input id="new-due" type="date" title="Optional due date" />
        <input id="new-time" type="time" title="Optional due time" />
        <button class="add-btn" id="add-btn">Add</button>
      </div>
      <div class="filters" id="filters">
        <button class="filter-btn active" data-filter="all">All <span class="badge" data-count="all">0</span></button>
        <button class="filter-btn" data-filter="active">Active <span class="badge" data-count="active">0</span></button>
        <button class="filter-btn" data-filter="done">Done <span class="badge" data-count="done">0</span></button>
        <button class="filter-btn" data-filter="timing">Timing <span class="badge" data-count="timing">0</span></button>
      </div>
      <div class="toolbar">
        <input id="search" type="search" placeholder="🔍 Search tasks…" autocomplete="off" />
        <label class="sort-label" for="sort-select">Sort</label>
        <select id="sort-select">
          <option value="manual">My order</option>
          <option value="due">Due date</option>
        </select>
      </div>
      <div class="tag-filter" id="tag-filter" hidden></div>
      <ul id="task-list"></ul>
      <div class="footer">
        <span id="count">0 items left</span>
        <button class="clear-btn" id="clear-done">Clear completed</button>
      </div>
    </div>
  </div>

  <div class="overlay" id="help-overlay" hidden>
    <div class="help-card">
      <h2>Keyboard shortcuts</h2>
      <ul class="help-list">
        <li><kbd>n</kbd><span>New task</span></li>
        <li><kbd>/</kbd><span>Search</span></li>
        <li><kbd>1</kbd> <kbd>2</kbd> <kbd>3</kbd> <kbd>4</kbd><span>Filter: All / Active / Done / Timing</span></li>
        <li><kbd>d</kbd><span>Toggle dark mode</span></li>
        <li><kbd>?</kbd><span>Show / hide this help</span></li>
        <li><kbd>Esc</kbd><span>Close help · clear search</span></li>
      </ul>
      <button class="add-btn" id="help-close">Close</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
